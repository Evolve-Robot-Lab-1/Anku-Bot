# ROS2 Controllers Configuration for Mobile Manipulator
# =====================================================
# This configuration defines controllers for both arm and mobile base.
# Note: Since we're using a custom Python hardware interface (not ros2_control
# hardware interface plugin), these are reference configurations for when
# ros2_control is fully integrated.

controller_manager:
  ros__parameters:
    update_rate: 50  # Hz

    # List of active controllers
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: position_controllers/GripperActionController

# Joint State Broadcaster - publishes all joint states
joint_state_broadcaster:
  ros__parameters:
    joints:
      # Arm joints
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - gripper_base_joint
      - left_gear_joint
      # Wheel joints
      - front_left_joint
      - front_right_joint
      - back_left_joint
      - back_right_joint
    interfaces:
      - position
      - velocity

# Arm Trajectory Controller - for MoveIt integration
arm_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - gripper_base_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: true
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

# Gripper Controller
gripper_controller:
  ros__parameters:
    joint: left_gear_joint
    action_monitor_rate: 20.0
    goal_tolerance: 0.01
    max_effort: 100.0
    stall_velocity_threshold: 0.001
    stall_timeout: 1.0
