planning_plugin: ompl_interface/OMPLPlanner
request_adapters: "default_planner_request_adapters/AddTimeOptimalParameterization default_planner_request_adapters/ResolveConstraintFrames default_planner_request_adapters/FixWorkspaceBounds default_planner_request_adapters/FixStartStateBounds default_planner_request_adapters/FixStartStateCollision"
start_state_max_bounds_error: 0.1

arm:
  planner_configs:
    - RRTConnect
    - RRT
    - RRTstar
    - PRM
  projection_evaluator: joints(joint_1,joint_2)
  longest_valid_segment_fraction: 0.005

gripper:
  planner_configs:
    - RRTConnect
  projection_evaluator: joints(left_gear_joint)
  longest_valid_segment_fraction: 0.005

planner_configs:
  RRTConnect:
    type: geometric::RRTConnect
    range: 0.0
  RRT:
    type: geometric::RRT
    range: 0.0
    goal_bias: 0.05
  RRTstar:
    type: geometric::RRTstar
    range: 0.0
    goal_bias: 0.05
    delay_collision_checking: 1
  PRM:
    type: geometric::PRM
    max_nearest_neighbors: 10
